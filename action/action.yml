name: Doc Audit (composite)
description: Multi-dimension document audit — extracts, diffs, runs rules, dispatches to server, reports.
inputs:
  config:
    description: Path to .github/doc-audit.yml
    required: true
    default: .github/doc-audit.yml
  server_url:
    description: Audit Service base URL
    required: false
    default: ""
  server_token:
    description: Bearer token for the audit server
    required: false
    default: ""
  anthropic_key_fallback:
    description: Anthropic API key used by the local fallback when the server is unreachable
    required: false
    default: ""
  enable_sarif:
    description: Whether to emit SARIF
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install requirements
      shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"
    - name: Run audit pipeline
      shell: bash
      env:
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_SERVER_URL: ${{ inputs.server_url }}
        INPUT_SERVER_TOKEN: ${{ inputs.server_token }}
        INPUT_ANTHROPIC_KEY_FALLBACK: ${{ inputs.anthropic_key_fallback }}
        INPUT_ENABLE_SARIF: ${{ inputs.enable_sarif }}
        GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        # `gh` reads GH_TOKEN for auth; without this every `gh api` call in
        # publish.sh fails silently (publish.sh's `|| log ...` keeps the
        # action green so the failure is invisible unless you grep the log).
        GH_TOKEN: ${{ github.token }}
      run: bash "${{ github.action_path }}/entrypoint.sh"
